name: Android Release CI/CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: cd ssmobile && chmod +x gradlew

      - name: Build ssmobile Release APK
        run: cd ssmobile && ./gradlew assembleRelease

      # --- TODO: Sign the APK ---
      # - name: Sign Release APK
      #   uses: r0adkll/sign-android-release@v1
      #   id: sign_app
      #   with:
      #     releaseDirectory: app/build/outputs/apk/release
      #     signingKeyBase64: ${{ secrets.SIGNING_KEY }}
      #     alias: ${{ secrets.ALIAS }}
      #     keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
      #     keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          # If signed, use the signed path provided by the signing action
          path: ssmobile/app/build/outputs/apk/release/*.apk 

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ssmobile/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
